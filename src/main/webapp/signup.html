<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Hospital Management App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Signup</a>
    </nav>

    <h1>Create Account</h1>

    <form class="page-card" action="signup" method="POST">
        <div id="msg"></div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" required minlength="4">

        <button type="submit">Sign Up</button>
    </form>

    <footer>&copy; 2025 Hospital Management App | All rights reserved</footer>
    <script>
        const params = new URLSearchParams(window.location.search);
        const msg = document.getElementById('msg');
        if (params.get('error') === 'email-exists') {
            msg.className = 'alert alert-error';
            msg.textContent = 'This email is already registered.';
        } else if (params.get('error')) {
            msg.className = 'alert alert-error';
            msg.textContent = 'Signup failed. Please try again.';
        }
    </script>
</body>
</html>
