<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Doctor Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html">Logout</a>
    </nav>

    <h1>Create Doctor Profile</h1>

    <form class="page-card" action="createDoctorProfile" method="POST">
        <div id="msg"></div>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" required>
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" name="age" id="age" min="25" max="80" required>
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" name="address" id="address" required>
        </div>
        <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="text" name="mobile" id="mobile" pattern="[0-9]{10,15}" required>
        </div>
        <div class="form-group">
            <label for="gender">Gender</label>
            <select name="gender" id="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="department">Department</label>
            <input type="text" name="department" id="department" required>
        </div>
        <div class="form-group">
            <label for="experience">Experience</label>
            <input type="text" name="experience" id="experience" placeholder="e.g. 10 years" required>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" name="availability" id="availability" value="true" checked>
            <label for="availability" style="margin:0;">Available for appointments</label>
        </div>
        <button type="submit">Save Doctor</button>
    </form>

    <footer>&copy; 2025 Hospital Management App | All rights reserved</footer>
    <script>
        if (new URLSearchParams(window.location.search).get('error')) {
            const msg = document.getElementById('msg');
            msg.className = 'alert alert-error';
            msg.textContent = 'Could not save doctor. Check all fields and try again.';
        }
    </script>
</body>
</html>
